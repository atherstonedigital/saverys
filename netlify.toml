[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_* vars are inlined into client/server bundles by Next.js by
  # design; the scanner must be told these specific keys are public.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_TURNSTILE_SITE_KEY,NEXT_PUBLIC_GA_ID,NEXT_PUBLIC_SITE_URL"
  # Belt-and-braces: skip generated Next.js build output. These directories
  # contain compiled framework code, never hand-written source, and Netlify
  # rebuilds them from scratch each deploy. OMIT_KEYS alone has been
  # unreliable when Netlify's pattern-based detection kicks in.
  SECRETS_SCAN_OMIT_PATHS = ".next/**,.netlify/**"

# Disable Netlify's HTML "Pretty URLs" so it doesn't fight Next.js's own
# trailing-slash handling (Next defaults to trailingSlash: false). Without
# this, the two engines can canonicalise the same URL in opposite directions
# and produce ERR_TOO_MANY_REDIRECTS.
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Editorial-workflow strategy:
# - Random branch pushes don't build (saves minutes)
# - PR / draft branches DO build a deploy preview, so CMS editors can review
#   their drafts at deploy-preview-N--saverys.netlify.app before publishing.
# - Production only rebuilds when a draft PR is merged via the CMS "Publish"
#   action.
[context.branch-deploy]
  command = "exit 0"
  ignore = "/bin/true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

