[build]
  command = "npm run build"
  publish = ".next"

# Disable Netlify's HTML "Pretty URLs" so it doesn't fight Next.js's own
# trailing-slash handling (Next defaults to trailingSlash: false). Without
# this, the two engines can canonicalise the same URL in opposite directions
# and produce ERR_TOO_MANY_REDIRECTS.
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CMS draft branches and PR previews must NOT trigger production-style
# builds — they cost build minutes and can confuse the deploy state.
# Only the production branch (claude/saverys-studio-setup-ILvNL) builds.
[context.branch-deploy]
  command = "exit 0"
  ignore = "/bin/true"

[context.deploy-preview]
  command = "exit 0"
  ignore = "/bin/true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

