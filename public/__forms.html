<!DOCTYPE html>
<html>
  <head><title>Forms</title></head>
  <body>
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="bot-field" />
      <select name="enquiry_type"></select>
      <input name="name" type="text" />
      <input name="email" type="email" />
      <textarea name="message"></textarea>
      <!-- Enquiry source capture — 2026-06-26: first-touch attribution.
           Field names must match the hidden inputs in ContactSection.tsx
           character for character or Netlify drops them silently. -->
      <input type="hidden" name="utm_source" />
      <input type="hidden" name="utm_medium" />
      <input type="hidden" name="utm_campaign" />
      <input type="hidden" name="utm_term" />
      <input type="hidden" name="utm_content" />
      <input type="hidden" name="gclid" />
      <input type="hidden" name="fbclid" />
      <input type="hidden" name="referrer" />
      <input type="hidden" name="landing_page" />
      <input type="hidden" name="submitted_page" />
    </form>
    <!-- Ludlow enquiry form — 2026-07-14: Google Ads landing page form.
         Netlify only registers forms it can see in static HTML at build
         time, so this mirror exists purely for the build bot. Field names
         must match components/LudlowEnquiryForm.tsx character for character
         or Netlify drops them silently. -->
    <form name="ludlow-enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="ludlow-enquiry" />
      <input type="hidden" name="bot-field" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <select name="project-type"></select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
