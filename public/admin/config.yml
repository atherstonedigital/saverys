backend:
  name: github
  repo: atherstonedigital/saverys
  branch: claude/saverys-studio-setup-ILvNL

# Drafts saved in the CMS land on cms/<collection>/<slug> branches as
# pull requests. They do not deploy to production until the entry is
# moved to "Ready" and the user clicks Publish (which merges the PR).
publish_mode: editorial_workflow

media_folder: "public/images"
public_folder: "/images"

collections:
  # ── Page content (single files) ──────────────────────────

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Homepage"
        file: "content/pages/home.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string", hint: "Browser tab title — include key location words for SEO" }
              - { label: "Meta Description", name: "description", widget: "text", hint: "155 characters max. Shown in Google search results." }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false, hint: "1200x630px. Falls back to default if empty." }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text", required: false }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Studio Intro"
            name: "studioIntro"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "Featured Projects"
            name: "featuredProjects"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly name. Must match a project slug — e.g. saverys-1." }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Services Section"
            name: "services"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Service Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "about"
        label: "About"
        file: "content/pages/about.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image 1", name: "image1", widget: "image" }
              - { label: "Image 2", name: "image2", widget: "image" }
          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "workshop"
        label: "Workshop"
        file: "content/pages/workshop.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "What we make (three pillars)"
            name: "pillars"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Pillars"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Image break"
            name: "imageBreak"
            widget: "object"
            required: false
            fields:
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Alt text", name: "alt", widget: "string", required: false }
          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text", required: false }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "showroom"
        label: "Showroom (landing)"
        file: "content/pages/showroom.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Showroom cards"
            name: "showrooms"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Link", name: "href", widget: "string", hint: "e.g. /showroom/broadway" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Address", name: "address", widget: "string" }

      - name: "showroom-broadway"
        label: "Broadway Showroom"
        file: "content/pages/showroom-broadway.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Introduction"
            name: "introduction"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Showroom"
            name: "showroom"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Workshop"
            name: "workshop"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Fabrics & Rugs"
            name: "fabrics"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Expert Service"
            name: "expertise"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Visit Us"
            name: "visitUs"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Address", name: "address", widget: "text" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Visits", name: "visits", widget: "string", hint: "e.g. By appointment" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "showroom-ludlow"
        label: "Ludlow Showroom"
        file: "content/pages/showroom-ludlow.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Location Label", name: "locationLabel", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Image", name: "image", widget: "image", required: false }
          - label: "Features"
            name: "features"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } }
          - label: "Visit Us"
            name: "visitUs"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Address", name: "address", widget: "text" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Mobile", name: "mobile", widget: "string", required: false }
              - { label: "Opening Hours", name: "hours", widget: "text" }
              - { label: "Parking", name: "parking", widget: "string", required: false }
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "services"
        label: "Services"
        file: "content/pages/services.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "projects-page"
        label: "Projects Page"
        file: "content/pages/projects.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - name: "contact"
        label: "Contact"
        file: "content/pages/contact.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "ogImage", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Showrooms"
            name: "showrooms"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address Line 1", name: "address1", widget: "string" }
              - { label: "Address Line 2", name: "address2", widget: "string", required: false }
              - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string" }
          - label: "Enquiry Types"
            name: "enquiryTypes"
            widget: "list"
            field: { label: "Type", name: "type", widget: "string" }

  # ── Site settings ────────────────────────────────────────

  - name: "settings"
    label: "Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Site Description", name: "siteDescription", widget: "text" }
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Social Image", name: "socialImage", widget: "image", hint: "Default Open Graph image (1200x630px) used when pages don't set their own" }

      - name: "navigation"
        label: "Navigation"
        file: "content/settings/navigation.json"
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
              - label: "Dropdown Items"
                name: "children"
                widget: "list"
                required: false
                hint: "Leave empty for a simple link. Add items to create a dropdown."
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }

      - name: "sourcing"
        label: "Sourcing block"
        file: "content/settings/sourcing.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "text", hint: "Editable body of the Sourcing block. Used on the Workshop page and anywhere else the block is placed." }

      - name: "footer"
        label: "Footer"
        file: "content/settings/footer.json"
        fields:
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - label: "Locations"
            name: "locations"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Phone (display)", name: "phone", widget: "string" }
              - { label: "Phone (tel: link)", name: "phoneTel", widget: "string", hint: "International format, e.g. +441386858941" }
          - label: "Footer Links"
            name: "links"
            widget: "list"
            hint: "Links shown in the 'Explore' column. Use descriptive anchor text for SEO."
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

  # ── Blog / Journal ──────────────────────────────────────

  - name: "journal"
    label: "Journal"
    folder: "content/journal"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      # SEO launch prep — 2026-04-27 / polish — 2026-04-27
      # Alt text required for every new entry. Existing flat
      # featuredImage/featuredImageAlt structure retained for backward
      # compatibility with content/journal/*.md frontmatter.
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured Image Alt Text", name: "featuredImageAlt", widget: "string", required: true, pattern: ['.{4,}', "Required. Describe the image (4+ characters) for screen readers and search engines."], hint: "Required. Describe the image for screen readers and search engines (e.g., 'Drawing room in a Cotswold country house')." }
      - { label: "Summary", name: "summary", widget: "text", required: false, hint: "Short description for listings, social cards, and SEO (max 155 characters)" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Pillar"
        name: "pillar"
        widget: "select"
        options:
          - { label: "Craft & Making", value: "craft" }
          - { label: "Fabric & Material", value: "fabric" }
          - { label: "Place & Cotswolds", value: "place" }
          - { label: "Design Thinking", value: "design" }
          - { label: "Project Stories", value: "project" }
        required: false
        hint: "Editorial category — helps organise content"
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "e.g. Cotswolds, Fabrics, Upholstery, Broadway, Ludlow" }
      - { label: "SEO Title Override", name: "seoTitle", widget: "string", required: false, hint: "Custom title tag (defaults to 'Title | Saverys Journal' if empty)" }
      - { label: "SEO Description Override", name: "seoDescription", widget: "string", required: false, hint: "Custom meta description (defaults to Summary if empty)" }

  # ── Portfolio Projects ──────────────────────────────────

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{location}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string", hint: "Anonymised — e.g. Saverys 1, Saverys 2…" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly. Use saverys-N (the next number after the highest existing one)." }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "Shown on cards and detail pages. e.g. Broadway, Worcestershire" }
      - { label: "Year", name: "year", widget: "string", required: false, hint: "Optional. Shown on the detail page next to location." }
      - { label: "Description", name: "description", widget: "text", hint: "Short tagline for project cards (1–2 sentences)." }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      # SEO launch prep — 2026-04-27 / polish — 2026-04-27
      # Hero alt now required. Existing saverys-1..4 carry placeholder alt
      # ("Saverys N project — interior photography") pending Gary backfill —
      # see audit-reports/missing-alt-text.md.
      - { label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string", required: true, pattern: ['.{4,}', "Required. Describe the hero image (4+ characters) for screen readers and search engines."], hint: "Required. Describe the image for screen readers and search engines (e.g., 'Drawing room in a Cotswold country house')." }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          # SEO launch prep — 2026-04-27 / polish — 2026-04-27
          - { label: "Alt text", name: "alt", widget: "string", required: true, pattern: ['.{4,}', "Required. Describe the image (4+ characters) for screen readers and search engines."], hint: "Required. Describe the image for screen readers and search engines (e.g., 'Drawing room in a Cotswold country house')." }
          - label: "Orientation"
            name: "orientation"
            widget: "select"
            options:
