backend:
  name: github
  repo: atherstonedigital/saverys
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "journal"
    label: "Journal"
    folder: "content/journal"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text", required: false, hint: "Short description for listings and SEO" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "e.g. Cotswolds, fabrics, renovation" }

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "e.g. Broadway, Cotswolds" }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      - { label: "Gallery", name: "gallery", widget: "list", field: { label: "Image", name: "image", widget: "image" }, required: false }
      - { label: "Description", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Show on homepage" }
      - { label: "Order", name: "order", widget: "number", default: 0, hint: "Lower numbers appear first" }
