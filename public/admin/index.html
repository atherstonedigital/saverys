<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Saverys — Content Manager</title>
    <link rel="icon" href="/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Courier+Prime&family=Jost:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      /*  Saverys CMS Theme
          charcoal #2C2C2C · stone #6b6358 · clay #A0896C
          cream #F5F0EB · linen #EDE8E1 · ink #1A1A1A  */

      /* ── Reset the grey ────────────────────────────────────── */
      html, body, #nc-root, #root,
      [class*="AppMainContainer"], [class*="defaultMain"],
      main, [id="main"] {
        background: #EDE8E1 !important;
        font-family: "Jost", "Helvetica Neue", sans-serif !important;
        -webkit-font-smoothing: antialiased;
      }

      /* Catch-all for the grey wrapper divs */
      #nc-root > div,
      #nc-root > div > div,
      #nc-root > div > div > div {
        background: #EDE8E1 !important;
      }

      /* ── Header ────────────────────────────────────────────── */
      header, nav[class*="Header"], [class*="AppHeader"] {
        background: #1A1A1A !important;
        border-bottom: none !important;
        box-shadow: none !important;
      }
      header *, nav[class*="Header"] * {
        font-family: "Jost", sans-serif !important;
        letter-spacing: 0.04em !important;
      }
      header a[href="#/"],
      header a[href="#/"]:visited {
        font-family: "Cormorant Garamond", Georgia, serif !important;
        font-weight: 300 !important;
        font-size: 1.2rem !important;
        letter-spacing: 0.08em !important;
        color: #F5F0EB !important;
      }
      header a, header span, header button {
        color: rgba(245, 240, 235, 0.7) !important;
        font-weight: 300 !important;
      }
      header a:hover, header button:hover {
        color: #F5F0EB !important;
      }
      /* Quick add button */
      header button[class*="DropdownButton"],
      header button[class*="dropdown"] {
        background: transparent !important;
        border: 1px solid rgba(245, 240, 235, 0.25) !important;
        color: rgba(245, 240, 235, 0.7) !important;
        font-size: 0.7rem !important;
        text-transform: uppercase !important;
        letter-spacing: 0.06em !important;
        border-radius: 0 !important;
        padding: 6px 14px !important;
      }
      header button[class*="DropdownButton"]:hover,
      header button[class*="dropdown"]:hover {
        border-color: rgba(245, 240, 235, 0.5) !important;
        color: #F5F0EB !important;
      }

      /* ── Sidebar ───────────────────────────────────────────── */
      aside, [class*="SidebarContainer"], [class*="Sidebar"] {
        background: #F5F0EB !important;
        border-right: 1px solid rgba(160, 137, 108, 0.15) !important;
      }
      /* "Collections" heading */
      aside h2, [class*="SidebarHeading"] {
        font-family: "Cormorant Garamond", Georgia, serif !important;
        font-weight: 300 !important;
        font-size: 1.4rem !important;
        letter-spacing: 0.04em !important;
        color: #2C2C2C !important;
        padding-left: 20px !important;
      }
      /* Search input */
      aside input, [class*="Sidebar"] input {
        background: #EDE8E1 !important;
        border: 1px solid rgba(160, 137, 108, 0.15) !important;
        border-radius: 0 !important;
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        color: #2C2C2C !important;
      }
      aside input:focus {
        border-color: #A0896C !important;
      }
      /* Nav items */
      aside a, [class*="SidebarNavLink"] {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        font-size: 0.875rem !important;
        letter-spacing: 0.02em !important;
        color: #6b6358 !important;
        border-left: 3px solid transparent !important;
        transition: all 0.2s ease !important;
      }
      aside a:hover, [class*="SidebarNavLink"]:hover {
        color: #2C2C2C !important;
        background: rgba(160, 137, 108, 0.06) !important;
      }
      aside a[class*="active"],
      aside a[href][class*="selected"],
      [class*="SidebarNavLink"][class*="active"] {
        color: #2C2C2C !important;
        font-weight: 400 !important;
        border-left-color: #A0896C !important;
        background: rgba(160, 137, 108, 0.08) !important;
      }
      /* Sidebar icons */
      aside svg {
        color: #A0896C !important;
        opacity: 0.6 !important;
      }

      /* ── Collection list heading ───────────────────────────── */
      [class*="CollectionTop"] h2,
      [class*="ViewHeader"] h2 {
        font-family: "Cormorant Garamond", Georgia, serif !important;
        font-weight: 300 !important;
        font-size: 1.6rem !important;
        letter-spacing: 0.04em !important;
        color: #2C2C2C !important;
        background: #F5F0EB !important;
        border-bottom: 1px solid rgba(160, 137, 108, 0.12) !important;
        padding: 24px 28px !important;
      }

      /* ── Entry list cards ──────────────────────────────────── */
      [class*="ListCard"], [class*="EntryCard"] {
        background: #F5F0EB !important;
        border: 1px solid rgba(160, 137, 108, 0.12) !important;
        border-radius: 0 !important;
        transition: all 0.2s ease !important;
        box-shadow: none !important;
      }
      [class*="ListCard"]:hover, [class*="EntryCard"]:hover {
        border-color: #A0896C !important;
        box-shadow: 0 2px 12px rgba(160, 137, 108, 0.1) !important;
      }
      [class*="ListCard"] a, [class*="ListCardLink"],
      [class*="EntryCard"] a {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        color: #2C2C2C !important;
        letter-spacing: 0.01em !important;
      }
      [class*="ListCard"] h2 {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        font-size: 1rem !important;
        color: #2C2C2C !important;
      }

      /* ── Sort / view controls ──────────────────────────────── */
      [class*="SortControls"] span,
      [class*="ViewControls"] button {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        color: #6b6358 !important;
        font-size: 0.8rem !important;
      }

      /* ── Editor page ───────────────────────────────────────── */
      /* Field groups / object widgets */
      [class*="ObjectWidgetTopBar"],
      [class*="StyledListItemTopBar"],
      fieldset > legend {
        background: #EDE8E1 !important;
        font-family: "Jost", sans-serif !important;
        font-weight: 400 !important;
        font-size: 0.65rem !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        color: #6b6358 !important;
        border: none !important;
        border-bottom: 1px solid rgba(160, 137, 108, 0.1) !important;
      }

      /* Field labels */
      label, [class*="ControlLabel"], [class*="FieldLabel"] {
        font-family: "Jost", sans-serif !important;
        font-weight: 400 !important;
        font-size: 0.65rem !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        color: #6b6358 !important;
      }

      /* Hint text */
      [class*="ControlHint"], p[class*="hint"] {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        font-size: 0.75rem !important;
        color: #A0896C !important;
        font-style: italic !important;
      }

      /* Inputs */
      input[type="text"], input[type="url"], input[type="email"],
      input[type="number"], textarea, select {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        font-size: 0.95rem !important;
        color: #2C2C2C !important;
        background: #FAFAF8 !important;
        border: 1px solid rgba(160, 137, 108, 0.2) !important;
        border-radius: 0 !important;
        transition: border-color 0.3s ease !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #A0896C !important;
        box-shadow: none !important;
        outline: none !important;
      }

      /* ── Publish button ────────────────────────────────────── */
      [class*="ToolbarButton"],
      [class*="PublishButton"],
      button[class*="DropdownButton"] {
        border-radius: 0 !important;
      }

      /* ── Markdown editor ───────────────────────────────────── */
      [data-slate-editor] {
        font-family: "Jost", "Helvetica Neue", sans-serif !important;
        font-weight: 300 !important;
        font-size: 16px !important;
        line-height: 1.75 !important;
        letter-spacing: 0.02em !important;
        color: #6b6358 !important;
        max-width: 720px !important;
        padding: 2rem !important;
        background: #FAFAF8 !important;
      }
      [data-slate-editor] h1,
      [data-slate-editor] h2,
      [data-slate-editor] h3 {
        font-family: "Cormorant Garamond", Georgia, serif !important;
        color: #2C2C2C !important;
      }
      [data-slate-editor] h2 {
        font-weight: 300 !important;
        font-size: 1.5rem !important;
        line-height: 1.2 !important;
        letter-spacing: 0.04em !important;
        margin-top: 2rem !important;
      }
      [data-slate-editor] h3 {
        font-weight: 400 !important;
        font-size: 1.25rem !important;
        line-height: 1.2 !important;
        margin-top: 1.5rem !important;
      }
      [data-slate-editor] strong {
        font-weight: 400 !important;
        color: #2C2C2C !important;
      }
      [data-slate-editor] blockquote {
        border-left: 2px solid #A0896C !important;
        padding-left: 1.5rem !important;
        font-style: italic !important;
      }
      [data-slate-editor] img {
        max-width: 100% !important;
        height: auto !important;
      }

      /* ── Preview pane ──────────────────────────────────────── */
      .frame-content,
      [class*="PreviewPaneFrame"] {
        font-family: "Jost", "Helvetica Neue", sans-serif !important;
        background: #F5F0EB !important;
      }

      /* ── Dropdowns / menus ─────────────────────────────────── */
      ul[class*="DropdownList"], [class*="MenuList"],
      [role="listbox"] {
        background: #F5F0EB !important;
        border: 1px solid rgba(160, 137, 108, 0.15) !important;
        border-radius: 0 !important;
        box-shadow: 0 4px 20px rgba(26, 26, 26, 0.08) !important;
      }
      [class*="DropdownItem"], [role="option"] {
        font-family: "Jost", sans-serif !important;
        font-weight: 300 !important;
        color: #2C2C2C !important;
      }
      [class*="DropdownItem"]:hover, [role="option"]:hover {
        background: rgba(160, 137, 108, 0.08) !important;
      }

      /* ── Scrollbar ─────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(160, 137, 108, 0.25);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(160, 137, 108, 0.45);
      }

      /* ── Selection ─────────────────────────────────────────── */
      ::selection {
        background-color: #A0896C;
        color: #F5F0EB;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
