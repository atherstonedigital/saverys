<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Saverys — Content Manager</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Courier+Prime&family=Jost:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Preview pane styling to match the live site */
      [data-slate-editor] {
        font-family: "Jost", "Helvetica Neue", sans-serif !important;
        font-weight: 300 !important;
        font-size: 16px !important;
        line-height: 1.75 !important;
        letter-spacing: 0.02em !important;
        color: #6b6358 !important;
        max-width: 720px !important;
        padding: 2rem !important;
      }
      [data-slate-editor] h1,
      [data-slate-editor] h2,
      [data-slate-editor] h3 {
        font-family: "Cormorant Garamond", Georgia, serif !important;
        color: #2c2c2c !important;
      }
      [data-slate-editor] h2 {
        font-weight: 300 !important;
        font-size: 1.5rem !important;
        line-height: 1.2 !important;
        letter-spacing: 0.04em !important;
        margin-top: 2rem !important;
        margin-bottom: 0.75rem !important;
      }
      [data-slate-editor] h3 {
        font-weight: 400 !important;
        font-size: 1.25rem !important;
        line-height: 1.2 !important;
        margin-top: 1.5rem !important;
        margin-bottom: 0.5rem !important;
      }
      [data-slate-editor] p {
        margin-bottom: 1.25rem !important;
      }
      [data-slate-editor] strong {
        font-weight: 400 !important;
        color: #2c2c2c !important;
      }
      [data-slate-editor] blockquote {
        border-left: 2px solid #a0896c !important;
        padding-left: 1.5rem !important;
        margin: 1.5rem 0 !important;
        font-style: italic !important;
      }
      [data-slate-editor] a {
        color: #2c2c2c !important;
        text-decoration: underline !important;
        text-underline-offset: 3px !important;
      }
      [data-slate-editor] img {
        max-width: 100% !important;
        height: auto !important;
        margin: 1.5rem 0 !important;
      }
      /* Preview template styling */
      .frame-content {
        font-family: "Jost", "Helvetica Neue", sans-serif !important;
        background: #f5f0eb !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
